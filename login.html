<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - MedTech</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/login.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <a href="index.html">
                        <span class="logo-med">Med</span><span class="logo-tech">Tech</span>
                    </a>
                </div>
                
                <div class="nav-menu" id="nav-menu">
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a href="index.html" class="nav-link">Home</a>
                        </li>
                        <li class="nav-item">
                            <a href="chat.html" class="nav-link">Chat</a>
                        </li>
                    </ul>
                </div>
                
                <div class="nav-actions">
                    <button class="settings-btn">
                        <i class="fas fa-cog"></i>
                    </button>
                    <a href="login.html" class="login-link active">Login</a>
                    <a href="login.html" class="signup-btn">Sign up</a>
                    <div class="profile-container">
                        <div class="profile-icon">
                            <i class="fas fa-user"></i>
                            <span class="notification-dot"></span>
                        </div>
                    </div>
                    <div class="hamburger" id="hamburger">
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Login Page -->
    <div class="login-page">
        <div class="login-container">
            <!-- Left Side - Login Form -->
            <div class="login-form-section">
                <div class="login-form-container">
                    <div class="login-header">
                        <h1 class="login-title">LOGIN</h1>
                        <p class="login-subtitle">Welcome back to MedTech</p>
                    </div>

                    <form class="login-form" id="loginForm">
                        <div class="form-group">
                            <div class="input-container">
                                <i class="fas fa-user input-icon"></i>
                                <input type="text" id="username" name="username" placeholder="Username" required>
                            </div>
                        </div>

                        <div class="form-group">
                            <div class="input-container">
                                <i class="fas fa-lock input-icon"></i>
                                <input type="password" id="password" name="password" placeholder="Password" required>
                                <button type="button" class="password-toggle" id="passwordToggle">
                                    <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>

                        <button type="submit" class="login-btn">
                            Login Now
                        </button>
                    </form>

                    <div class="social-login">
                        <p class="social-text">Login with Others</p>
                        
                        <button class="social-btn google-btn" onclick="loginWithGoogle()">
                            <div class="google-icon">
                                <svg viewBox="0 0 24 24" width="20" height="20">
                                    <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                                    <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                                    <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                                    <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                                </svg>
                            </div>
                            <span>Login with Google</span>
                        </button>

                        <button class="social-btn facebook-btn" onclick="loginWithFacebook()">
                            <div class="facebook-icon">
                                <i class="fab fa-facebook-f"></i>
                            </div>
                            <span>Login with Facebook</span>
                        </button>
                    </div>

                    <div class="signup-link">
                        <p>Don't have an account? <a href="index.html">Sign up</a></p>
                    </div>
                </div>
            </div>

            <!-- Right Side - Welcome Section -->
            <div class="welcome-section">
                <div class="welcome-content">
                    <div class="welcome-card">
                        <h2 class="welcome-title">Welcome to your personal health care companion</h2>
                        
                        <div class="healthcare-icons">
                            <div class="health-icon">
                                <i class="fas fa-desktop"></i>
                            </div>
                            <div class="health-icon">
                                <i class="fas fa-stethoscope"></i>
                            </div>
                            <div class="health-icon">
                                <i class="fas fa-clipboard-check"></i>
                            </div>
                        </div>

                        <div class="features-list">
                            <div class="feature-item">
                                <i class="fas fa-heart"></i>
                                <span>Personalized health insights</span>
                            </div>
                            <div class="feature-item">
                                <i class="fas fa-chart-line"></i>
                                <span>Real-time health monitoring</span>
                            </div>
                            <div class="feature-item">
                                <i class="fas fa-shield-alt"></i>
                                <span>Secure data protection</span>
                            </div>
                            <div class="feature-item">
                                <i class="fas fa-bolt"></i>
                                <span>AI-powered analysis</span>
                            </div>
                        </div>
                    </div>

                    <div class="lightning-icon">
                        <i class="fas fa-bolt"></i>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/login.js"></script>
</body>
</html>
