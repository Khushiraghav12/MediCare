<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARUN.ai Chat - MedTech</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/chat.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <nav class="navbar">
            <div class="nav-container">
                <div class="nav-logo">
                    <a href="index.html">
                        <span class="logo-med">Med</span><span class="logo-tech">Tech</span>
                    </a>
                </div>
                
                <div class="nav-menu" id="nav-menu">
                    <ul class="nav-list">
                        <li class="nav-item">
                            <a href="index.html" class="nav-link">Home</a>
                        </li>
                        <li class="nav-item">
                            <a href="chat.html" class="nav-link active">Chat</a>
                        </li>
                    </ul>
                </div>
                
                <div class="nav-actions">
                    <button class="settings-btn">
                        <i class="fas fa-cog"></i>
                    </button>
                    <a href="login.html" class="login-link">Login</a>
                    <a href="login.html" class="signup-btn">Sign up</a>
                    <div class="profile-container">
                        <div class="profile-icon">
                            <i class="fas fa-user"></i>
                            <span class="notification-dot"></span>
                        </div>
                    </div>
                    <div class="hamburger" id="hamburger">
                        <span class="bar"></span>
                        <span class="bar"></span>
                        <span class="bar"></span>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <!-- Chat Page -->
    <div class="chat-page">
        <!-- Background Animation -->
        <div class="chat-background">
            <div class="floating-shape shape-1"></div>
            <div class="floating-shape shape-2"></div>
            <div class="floating-shape shape-3"></div>
        </div>

        <div class="chat-container">
            <!-- Sidebar -->
            <div class="chat-sidebar">
                <!-- New Chat Button -->
                <div class="sidebar-section">
                    <button class="new-chat-btn">
                        <i class="fas fa-plus"></i>
                        New Chat
                    </button>
                </div>

                <!-- Chat History -->
                <div class="sidebar-section">
                    <div class="sidebar-title">Recent Chats</div>
                    <div class="chat-history">
                        <div class="chat-item active">
                            <div class="chat-item-name">Current Chat</div>
                            <div class="chat-item-time">Now</div>
                        </div>
                        <div class="chat-item">
                            <div class="chat-item-name">Health Questions</div>
                            <div class="chat-item-time">2 hours ago</div>
                        </div>
                        <div class="chat-item">
                            <div class="chat-item-name">Symptoms Analysis</div>
                            <div class="chat-item-time">1 day ago</div>
                        </div>
                        <div class="chat-item">
                            <div class="chat-item-name">Medication Advice</div>
                            <div class="chat-item-time">3 days ago</div>
                        </div>
                    </div>
                </div>

                <!-- Pro Button -->
                <div class="sidebar-section sidebar-bottom">
                    <button class="pro-btn">
                        <i class="fas fa-crown"></i>
                        Go Pro
                    </button>
                </div>
            </div>

            <!-- Main Chat Area -->
            <div class="chat-main">
                <!-- Chat Header -->
                <div class="chat-header">
                    <div class="chat-header-info">
                        <div class="bot-avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="bot-info">
                            <h2 class="bot-name">GARUN.ai</h2>
                            <p class="bot-status">Your AI Health Assistant</p>
                        </div>
                    </div>
                    <div class="chat-status">
                        <div class="status-indicator"></div>
                        <span class="status-text">Online</span>
                    </div>
                </div>

                <!-- Messages Area -->
                <div class="messages-container" id="messagesContainer">
                    <div class="message bot-message">
                        <div class="message-avatar">
                            <i class="fas fa-robot"></i>
                        </div>
                        <div class="message-content">
                            <div class="message-text">
                                Hello! I'm GARUN.ai, your personal health companion. How can I help you today?
                            </div>
                            <div class="message-time">Just now</div>
                        </div>
                    </div>
                </div>

                <!-- Quick Actions -->
                <div class="quick-actions">
                    <button class="quick-action-btn" onclick="sendQuickMessage('Analyze my symptoms')">
                        <i class="fas fa-chart-line"></i>
                        Analyze my symptoms
                    </button>
                    <button class="quick-action-btn" onclick="sendQuickMessage('Health tips')">
                        <i class="fas fa-heart"></i>
                        Health tips
                    </button>
                    <button class="quick-action-btn" onclick="sendQuickMessage('Medication advice')">
                        <i class="fas fa-pills"></i>
                        Medication advice
                    </button>
                    <button class="quick-action-btn" onclick="sendQuickMessage('Emergency help')">
                        <i class="fas fa-exclamation-triangle"></i>
                        Emergency help
                    </button>
                </div>

                <!-- Input Area -->
                <div class="chat-input-area">
                    <div class="input-container">
                        <button class="input-btn attachment-btn">
                            <i class="fas fa-paperclip"></i>
                        </button>
                        
                        <div class="input-wrapper">
                            <input type="text" id="messageInput" placeholder="What are your queries..." maxlength="500">
                            <button class="input-btn emoji-btn">
                                <i class="fas fa-smile"></i>
                            </button>
                        </div>

                        <button class="input-btn voice-btn" id="voiceBtn">
                            <i class="fas fa-microphone"></i>
                        </button>

                        <button class="send-btn" id="sendBtn">
                            <i class="fas fa-paper-plane"></i>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/chat.js"></script>
</body>
</html>
